name: relay-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Tidy + vet
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race -count=1 ./...

      - name: Build static binary for linux-amd64
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags='-s -w' \
            -o dist/chepherd-relay-linux-amd64 ./cmd/chepherd-relay
          ls -lh dist/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: chepherd-relay-linux-amd64
          path: dist/chepherd-relay-linux-amd64
